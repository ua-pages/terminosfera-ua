<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Terminosfera — Multilingual IT terminology database with translations, definitions, and etymology." />
  <title>Terminosfera</title>
  <link rel="stylesheet" href="src/css/app.css" />
  <script type="module" src="src/js/app.js"></script>
</head>
<body>
  <header class="header" role="banner">
    <div class="header__inner">
      <a href="./" class="header__brand">Terminosfera</a>
      <nav class="nav" id="nav" role="navigation"></nav>
      <div class="header__actions">
        <div id="language-switcher"></div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </header>
  <main class="main" id="app" role="main"></main>

  <template id="page-home">
    <div class="hero">
      <h1 class="hero__title">Терміносфера</h1>
    </div>
    <div class="progress-bar" id="progress-bar"></div>
    <div class="search-box" role="search">
      <span class="search-box__icon">🔍</span>
      <input type="search" class="search-box__input" id="search-input" placeholder="Пошук термінів..." autocomplete="off" />
      <button class="search-box__clear" id="search-clear" aria-label="Clear">✕</button>
    </div>
    <hr class="divider" />
    <div id="results-area"></div>
    <div id="data-error" style="display:none; padding:8px 12px; background:#fef2f2; color:#991b1b; font-size:0.85rem; font-family:var(--font-sans); margin-bottom:var(--space-md); border:1px solid #fecaca;"></div>
    <div class="suggestions" id="suggestions">
      <p class="suggestions__title">Спробуйте сьогодні</p>
      <div class="suggestions__list" id="suggestions-list"></div>
      <button class="suggestions__action" id="suggestions-shuffle">🎲 Показати інші</button>
    </div>
    <div class="suggestions" id="status-suggestions">
      <p class="suggestions__title">HTTP статуси <a href="#/http-status-codes" class="suggestions__link">Всі статуси →</a></p>
      <div class="suggestions__list" id="status-suggestions-list"></div>
    </div>
    <hr class="divider" />
    <div class="stats"><span id="stat-terms"></span></div>
  </template>

  <template id="page-status-codes-list">
    <div class="status-page">
      <h1 class="status-page__title">HTTP Status Codes</h1>
      <p class="status-page__subtitle">Довідник кодів відповіді HTTP</p>
      <div class="progress-bar" id="status-progress"></div>
      <div class="search-box" role="search">
        <span class="search-box__icon">🔍</span>
        <input type="search" class="search-box__input" id="status-search-input" placeholder="Пошук статусів..." autocomplete="off" />
        <button class="search-box__clear" id="status-search-clear" aria-label="Clear">✕</button>
      </div>
      <div id="status-list"></div>
    </div>
  </template>

  <template id="page-status-code">
    <a href="#/http-status-codes" class="term-page__back">← До статусів</a>
    <article class="status-detail">
      <div class="status-detail__headword">
        <button class="term-page__learn-btn" id="status-learn-btn">
          <span class="term-page__learn-icon" id="status-learn-icon">○</span>
          <span class="term-page__learn-text" id="status-learn-text">Позначити вивченим</span>
        </button>
        <div>
          <h1 class="status-detail__code" id="status-detail-code"></h1>
          <p class="status-detail__name" id="status-detail-name"></p>
        </div>
      </div>
      <div class="status-detail__group" id="status-detail-group"></div>
      <div class="term-page__content" id="status-detail-content"></div>
    </article>
  </template>

  <template id="page-term">
    <a href="#/" class="term-page__back">← Назад</a>
    <article class="term-page">
      <div class="term-page__headword">
        <button class="term-page__learn-btn" id="term-learn-btn">
          <span class="term-page__learn-icon" id="term-learn-icon">○</span>
          <span class="term-page__learn-text" id="term-learn-text">Позначити вивченим</span>
        </button>
        <div class="term-page__title-wrapper">
          <h1 class="term-page__title" id="term-title"></h1>
          <p class="term-page__title-translations" id="term-translations"></p>
        </div>
      </div>
      <div class="term-page__content" id="term-content"></div>
    </article>
  </template>

  <template id="term-section">
    <section>
      <h2 class="term-page__section-title" data-field="title"></h2>
      <div class="term-page__section-content" data-field="content"></div>
    </section>
  </template>
</body>
</html>
